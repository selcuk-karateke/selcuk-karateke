<style>
.src{
    background-image: url('exer/exer_11/img/searchicon.png');
    background-position: 96% 50%;
    background-repeat: no-repeat;
}
.error {
	color: #FF0000;
}

.ok {
	color: #00FF00;
}
</style>
<div class="row">
	<div class="col">
		<h2>Input:</h2>
		<p><span class="error">* required field.</span></p>
		<form method="post" action="">
		
			<label for="fname">Firstname <span class="error">* </span></label>
			<input type="text" class="form-control" id="fname" name="firstname" value="">
			
			<label for="lname">Lastname <span class="error">* </span></label>
			<input type="text" class="form-control" id="lname" name="lastname" value="">
			
			<label for="email">E-mail <span class="error">* </span></label>
			<input type="text" class="form-control" name="email" value="">
			
			<label for="website">Website <span class="error"></span></label>
			<input type="text" class="form-control" name="website" value="">
			
			<label for="comment">Comment</label>
			<textarea class="form-control" name="comment" id="comment" rows="5" cols="100%"></textarea>
			
			<label for="country">Country</label>
			<select id="country" class="form-control" multiple>
				<option value="de">Germany</option>
				<option value="au">Australia</option>
				<option value="ca">Canada</option>
				<option value="us">USA</option>
			</select>
			
			<label for="gender">Gender <span class="error">* </span></label>
			<input type="radio" name="gender" id="male" value="male" >
			<label for="male" class="form-check-label" >Male</label>
			<input type="radio" name="gender" id="female" value="female" >
			<label for="female" class="form-check-label" >Female</label>
			<input type="radio" name="gender" id="other" value="other" >
			<label for="other" class="form-check-label" >Other</label>
			<br/>
			<label for="age">Age <span class="error">* </span></label>
			<input type="date" class="form-control" name="age" id="age" value="$age">
			
			<label for="search">Search</label>
			<input type="text" class="form-control src" name="search" placeholder="Search..">
			
			<label for="action"></label>
			<button class="btn btn-primary btn-block" name="action">Submit</button>
		</form>
	</div>
	<div class="col">
		
	</div>
	<div class="col-sm-12">
		
		<h2>Output:</h2>
	
		<div class="table-responsive">
			<table class="table">
			<tr>
				<th>Id</th>
					<th>Firstname</th>
					<th>Lastname</th>
					<th>E-Mail</th>
					<th>Website</th>
					<th>Comment</th>
					<!--th>Country</th-->
					<th>Gender</th>
					<th>Age</th>
					<th>Registry Date</th>
				</tr>
			
			</table>
		</div>
		<p>Last insert ID: </p>
		<p>Row Count: </p>
		
		<pre>
			
		</pre>
	</div>
</div>
